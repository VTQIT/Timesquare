<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timesquare · 中国热点 · mobile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family: 'Source Serif 4', serif; background:#faf7f2; color:#0a0a0f; min-height:100vh; line-height:1.5; }
    .mobile-header { position:fixed; top:0; left:0; right:0; height:56px; background:#0a0a0f; display:flex; align-items:center; justify-content:space-between; padding:0 12px; border-bottom:2px solid #c8102e; z-index:2000; }
    .logo-mobile { display:flex; align-items:center; gap:6px; }
    .logo-icon { width:34px; height:34px; background:#c8102e; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display', serif; font-weight:900; font-size:22px; color:white; transform:scaleX(-1); }
    .logo-text { font-family:'Playfair Display', serif; font-size:18px; font-weight:900; color:white; letter-spacing:-0.3px; }
    .logo-text span { color:#c8102e; }
    .header-actions { display:flex; align-items:center; gap:8px; }
    .btn-translate-mobile { background:#c8922a; border:none; color:white; padding:5px 10px; border-radius:20px; font-size:11px; font-weight:600; font-family:'Source Serif 4', serif; }
    .user-avatar-mobile { width:34px; height:34px; background:linear-gradient(135deg,#c8922a,#c8102e); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:14px; }
    .mobile-container { max-width:600px; margin:56px auto 0; padding:12px; }
    .post-card-mobile { background:white; border-radius:16px; margin-bottom:16px; border:1px solid #ddd5c5; overflow:hidden; }
    .post-body-mobile { padding:10px 12px; }
    .post-title-mobile { font-family:'Playfair Display', serif; font-size:17px; font-weight:700; line-height:1.3; margin-bottom:6px; }
    .post-excerpt-mobile { font-size:13px; line-height:1.6; color:#333; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .loading-spinner { text-align:center; padding:20px; }
    .spinner { border:3px solid #ddd5c5; border-top:3px solid #c8102e; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite; margin:0 auto 10px; }
    @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div class="mobile-header">
  <div class="logo-mobile">
    <div class="logo-icon">时</div>
    <span class="logo-text">Time<span>square</span></span>
  </div>
  <div class="header-actions">
    <button class="btn-translate-mobile" id="translateToggleMobile">🌐 中</button>
    <div class="user-avatar-mobile">热</div>
  </div>
</div>

<div class="mobile-container" id="mobileFeed">
  <div class="loading-spinner">
    <div class="spinner"></div>
    <div>加载中国热点中...</div>
  </div>
</div>

<script>
  async function fetchNews() {
    const feed = document.getElementById('mobileFeed');
    feed.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><div>加载中国热点中...</div></div>`;
    try {
      const res = await fetch('/api/news'); // your Vercel API
      const data = await res.json();

      if (!data.articles || data.articles.length === 0) {
        feed.innerHTML = '<div class="post-card-mobile"><div class="post-body-mobile">没有新闻</div></div>';
        return;
      }

      feed.innerHTML = data.articles.map(article => `
        <div class="post-card-mobile">
          <div class="post-body-mobile">
            <div class="post-title-mobile">${article.title}</div>
            <div class="post-excerpt-mobile">${article.description || ''}</div>
            <div style="font-size:10px; color:#8a7f72; margin-top:4px;">来源: ${article.source.name || '未知'}</div>
          </div>
        </div>
      `).join('');
    } catch (err) {
      feed.innerHTML = `<div class="post-card-mobile"><div class="post-body-mobile">加载失败: ${err.message}</div></div>`;
    }
  }

  // Auto-refresh every 5 minutes
  setInterval(fetchNews, 300000);
  fetchNews();
</script>
</body>
</html>
