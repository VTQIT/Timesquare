<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timesquare Mobile</title>

<style>
body{font-family:Arial;background:#faf7f2;margin:0}
.header{position:fixed;top:0;width:100%;background:#111;color:white;padding:15px;font-weight:bold}
.container{margin-top:60px;padding:15px;max-width:600px;margin-left:auto;margin-right:auto}
.card{background:white;border-radius:15px;margin-bottom:15px;overflow:hidden;border:1px solid #ddd}
.card img{width:100%;height:200px;object-fit:cover}
.title{font-size:18px;font-weight:bold;padding:10px}
.excerpt{padding:0 10px 10px;color:#444}
.footer{padding:10px;border-top:1px solid #eee;display:flex;justify-content:space-between}
button{border:none;background:none;font-size:16px}
.liked{color:red}
.fab{position:fixed;bottom:20px;right:20px;background:#d4001a;color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px}
</style>
</head>

<body>

<div class="header">Timesquare</div>

<div class="container">
<input id="search" placeholder="Search news..." style="width:100%;padding:10px;border-radius:20px;border:1px solid #ccc;margin-bottom:15px">
<div id="feed"></div>
</div>

<div class="fab" onclick="loadNews()">↻</div>

<script>
let POSTS=[];
let likes={};

async function loadNews(){
try{
const res=await fetch("/api/news");
const data=await res.json();

POSTS=data.articles.slice(0,15).map((a,i)=>({
id:i,
title:a.title,
excerpt:a.description || "Latest news update",
image:a.urlToImage || "https://picsum.photos/400/250?"+i,
likes:Math.floor(Math.random()*5000)+500
}));

render();

}catch{
alert("API failed");
}
}

function render(list=POSTS){
const feed=document.getElementById("feed");
feed.innerHTML=list.map(p=>{
const liked=likes["l"+p.id];
const count=likes[p.id]??p.likes;

return`
<div class="card">
<img src="${p.image}">
<div class="title">${p.title}</div>
<div class="excerpt">${p.excerpt}</div>
<div class="footer">
<button class="${liked?'liked':''}" onclick="toggle(${p.id})">👍 ${count}</button>
</div>
</div>`;
}).join("");
}

function toggle(id){
likes["l"+id]=!likes["l"+id];
likes[id]=(likes[id]??POSTS[id].likes)+(likes["l"+id]?1:-1);
render();
}

document.getElementById("search").oninput=e=>{
const q=e.target.value.toLowerCase();
render(POSTS.filter(p=>p.title.toLowerCase().includes(q)));
};

loadNews();
</script>

</body>
</html>
